name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14  # Apple Silicon

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMake
        run: brew install cmake

      - name: Download bundled Whisper model
        run: ./download-model.sh ggml-tiny.en.bin

      - name: Package
        run: APP_VERSION="${GITHUB_REF_NAME#v}" ./package.sh

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/Yell.dmg \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
