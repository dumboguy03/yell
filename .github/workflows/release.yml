name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14  # Apple Silicon

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: command -v cmake >/dev/null || brew install cmake

      - name: Download Whisper model
        run: ./download-model.sh

      - name: Package
        run: ./package.sh

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/Yell.dmg \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
